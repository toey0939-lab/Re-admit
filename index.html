<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discharge AI Assistant (Smart Suggest)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
        }

        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        
        .ai-sparkle {
            background: linear-gradient(90deg, #0ea5e9, #6366f1, #d946ef);
            background-size: 200% 200%;
            animation: gradient-move 3s ease infinite;
        }
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        input, select, textarea, button {
            min-height: 48px;
        }
        
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Suggestion styling tweak */
        input::-webkit-calendar-picker-indicator {
            display: none !important; /* ซ่อนลูกศร default ของ datalist เพื่อความสะอาด */
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header -->
    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 px-4 py-3 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">
                <i class="fa-solid fa-hospital-user mr-1"></i>Discharge AI
            </h1>
            <div class="flex items-center space-x-2">
                <span id="syncStatus" class="hidden text-emerald-500 text-[10px]"><i class="fa-solid fa-cloud"></i> Connected</span>
                <span class="text-[10px] text-slate-400 font-medium bg-slate-100 px-2 py-1 rounded-full">Smart Suggest</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <!-- Dashboard Mini -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="card p-4 flex flex-col items-center justify-center text-center">
                <p class="text-[10px] text-slate-400 uppercase">จำหน่าย</p>
                <p id="totalDischarge" class="text-xl font-bold text-sky-600">0</p>
            </div>
            <div class="card p-4 flex flex-col items-center justify-center text-center border-orange-100 bg-orange-50/20">
                <p class="text-[10px] text-orange-400 uppercase">Re-admit</p>
                <p id="totalReadmit" class="text-xl font-bold text-orange-600">0</p>
            </div>
            <div class="card p-4 flex flex-col items-center justify-center text-center">
                <p class="text-[10px] text-slate-400 uppercase">Refer back</p>
                <p id="totalRefer" class="text-xl font-bold text-indigo-600">0</p>
            </div>
            <button onclick="generateReportSummary()" class="card p-4 flex flex-col items-center justify-center text-center bg-indigo-50 border-indigo-100 group">
                <i class="fa-solid fa-chart-line text-indigo-500 mb-1"></i>
                <p class="text-[10px] text-indigo-600 font-bold">สรุปด้วย AI</p>
            </button>
        </div>

        <!-- Add Item Form -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
            <h2 class="text-md font-bold mb-5 text-slate-700 flex items-center justify-between">
                <span><i class="fa-solid fa-file-medical-alt mr-2 text-sky-500"></i>บันทึกข้อมูล</span>
                <span class="text-[10px] text-sky-500 font-normal"><i class="fa-solid fa-lightbulb mr-1"></i>มีระบบแนะนำข้อมูลอัตโนมัติ</span>
            </h2>
            
            <div class="space-y-8">
                <!-- Group 1 -->
                <div class="space-y-4">
                    <div class="flex items-center space-x-2">
                        <span class="w-6 h-6 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center text-[10px] font-bold">1</span>
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">ข้อมูลพื้นฐาน</h3>
                    </div>
                    <div class="form-row">
                        <div>
                            <label class="block text-[11px] text-slate-400 mb-1 ml-1">วันที่จำหน่าย *</label>
                            <input type="date" id="disDate" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                        </div>
                        <input type="text" id="hn" placeholder="เลข HN *" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                        <input type="text" id="name" placeholder="ชื่อ-นามสกุล ผู้ป่วย *" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                        <div>
                            <label class="block text-[11px] text-slate-400 mb-1 ml-1">ประเภทการจำหน่าย</label>
                            <select id="disType" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                                <option value="จำหน่ายทุเลา">จำหน่ายทุเลา</option>
                                <option value="Refer back">Refer back</option>
                                <option value="สมัครใจกลับ">สมัครใจกลับ</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Group 2 -->
                <div class="space-y-4">
                    <div class="flex items-center space-x-2">
                        <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-[10px] font-bold">2</span>
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">การรักษาและนัดหมาย</h3>
                    </div>
                    <div class="form-row">
                        <input type="text" id="dxBefore" list="dxSuggestions" placeholder="การวินิจฉัยหลัก (แนะนำอัตโนมัติ)" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                        <datalist id="dxSuggestions"></datalist>

                        <input type="text" id="comorb" list="comorbSuggestions" placeholder="โรคร่วมอื่นๆ (แนะนำอัตโนมัติ)" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                        <datalist id="comorbSuggestions"></datalist>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1 ml-1">วันนัด</label>
                                <input type="date" id="fuDate" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1 ml-1">คลินิก</label>
                                <input type="text" id="clinic" list="clinicSuggestions" placeholder="ชื่อคลินิก" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                                <datalist id="clinicSuggestions"></datalist>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Group 3 -->
                <div class="space-y-4">
                    <div class="flex items-center space-x-2">
                        <span class="w-6 h-6 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-[10px] font-bold">3</span>
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">ข้อมูล RE-ADMIT (ถ้ามี)</h3>
                    </div>
                    <div class="form-row">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1 ml-1">วันที่ Re-admit</label>
                                <input type="date" id="readmitDate" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                            </div>
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1 ml-1">วอร์ดที่รับ</label>
                                <input type="text" id="ward" list="wardSuggestions" placeholder="Ward" class="w-full px-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm">
                                <datalist id="wardSuggestions"></datalist>
                            </div>
                        </div>
                        <textarea id="dxReadmit" rows="2" placeholder="สาเหตุหรืออาการสำคัญที่กลับมา..." class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-500/20 text-sm"></textarea>
                    </div>
                </div>

                <!-- Submit Button -->
                <button onclick="addItem()" id="btnSubmit" class="w-full bg-sky-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-sky-100 active:scale-95 flex items-center justify-center">
                    <span id="btnText"><i class="fa-solid fa-save mr-2"></i>บันทึกข้อมูลและส่ง Google Sheets</span>
                    <i id="btnLoading" class="fa-solid fa-circle-notch fa-spin hidden ml-2"></i>
                </button>
            </div>
        </div>

        <!-- History -->
        <div class="space-y-3">
            <h2 class="text-sm font-bold text-slate-500 px-1 flex justify-between items-center">
                <span>ประวัติล่าสุด</span>
                <button onclick="clearAll()" class="text-[10px] text-red-400">ล้างประวัติเครื่อง</button>
            </h2>
            <div id="mobileRecordList" class="space-y-3"></div>
        </div>

        <!-- Config -->
        <details class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
            <summary class="p-4 text-xs font-bold text-slate-400 cursor-pointer hover:bg-slate-50 list-none flex justify-between items-center">
                <span>ตั้งค่า Google Sheets URL</span>
                <i class="fa-solid fa-chevron-down"></i>
            </summary>
            <div class="p-4 border-t border-slate-50 space-y-3">
                <input type="password" id="scriptUrl" placeholder="URL..." class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none text-xs">
                <button onclick="saveConfig()" class="w-full bg-slate-100 py-2 rounded-xl text-xs font-bold text-slate-600">บันทึก</button>
            </div>
        </details>

    </main>

    <!-- AI Modal -->
    <div id="aiModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end md:items-center justify-center p-0 md:p-4">
        <div class="bg-white w-full max-w-lg rounded-t-3xl md:rounded-3xl shadow-2xl overflow-hidden animate-fade">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center ai-sparkle text-white">
                <h3 class="font-bold text-sm"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI Assistant</h3>
                <button onclick="closeModal()" class="p-2"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="aiContent" class="p-6 max-h-[70vh] overflow-y-auto custom-scrollbar text-sm leading-relaxed text-slate-600"></div>
            <div class="p-4 bg-slate-50 text-center">
                <button onclick="closeModal()" class="w-full py-3 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500">ปิด</button>
            </div>
        </div>
    </div>

    <div id="alertContainer" class="fixed top-5 left-4 right-4 z-[110] pointer-events-none flex flex-col space-y-2"></div>

    <script>
        const apiKey = ""; 
        let records = JSON.parse(localStorage.getItem('hospital_discharge_records')) || [];

        // ฟิลด์ที่จะใช้ระบบ Smart Suggestion
        const suggestFields = {
            dxBefore: 'dxSuggestions',
            comorb: 'comorbSuggestions',
            clinic: 'clinicSuggestions',
            ward: 'wardSuggestions'
        };

        document.getElementById('disDate').valueAsDate = new Date();
        const scriptUrlInput = document.getElementById('scriptUrl');
        scriptUrlInput.value = localStorage.getItem('hospital_gsheet_url') || '';
        
        function saveConfig() {
            localStorage.setItem('hospital_gsheet_url', scriptUrlInput.value.trim());
            checkSyncStatus();
            showAlert('บันทึกสำเร็จ', 'success');
        }

        function checkSyncStatus() {
            const status = document.getElementById('syncStatus');
            if (scriptUrlInput.value) status.classList.remove('hidden');
            else status.classList.add('hidden');
        }

        async function callGemini(prompt, sys = "คุณคือผู้ช่วยแพทย์ภาษาไทย") {
            const model = "gemini-2.5-flash-preview-09-2025";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: sys }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) { throw err; }
        }

        async function analyzePatient(idx) {
            const r = records[idx];
            showModal("✨ AI กำลังวิเคราะห์...");
            try {
                const res = await callGemini(`สรุปสั้นๆ 3 ข้อในการดูแลผู้ป่วย HN:${r.hn} โรค:${r.dxBefore} สำหรับญาติ`);
                document.getElementById('aiContent').innerHTML = res.replace(/\n/g, '<br>');
            } catch (e) { showModal("Error"); }
        }

        async function addItem() {
            const fields = ['disDate', 'hn', 'name', 'disType', 'dxBefore', 'comorb', 'fuDate', 'clinic', 'readmitDate', 'ward', 'dxReadmit'];
            const data = {};
            fields.forEach(f => data[f] = document.getElementById(f).value.trim());

            if (!data.disDate || !data.hn || !data.name) return showAlert('กรุณากรอกข้อมูลสำคัญ (*)', 'error');

            const item = { id: Date.now(), ...data };
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            document.getElementById('btnLoading').classList.remove('hidden');

            try {
                const url = localStorage.getItem('hospital_gsheet_url');
                if (url) await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
                records.unshift(item);
                saveData();
                render();
                resetForm();
                showAlert('บันทึกสำเร็จ', 'success');
            } catch (e) {
                showAlert('ผิดพลาด', 'error');
            } finally {
                btn.disabled = false;
                document.getElementById('btnLoading').classList.add('hidden');
            }
        }

        // ระบบจดจำข้อมูลเพื่อแนะนำ (Update Datalists)
        function updateSuggestions() {
            Object.keys(suggestFields).forEach(fieldKey => {
                const datalist = document.getElementById(suggestFields[fieldKey]);
                // ดึงค่าที่ไม่ซ้ำกันจาก records
                const values = [...new Set(records.map(r => r[fieldKey]).filter(v => v && v.length > 0))];
                
                datalist.innerHTML = '';
                values.forEach(val => {
                    const option = document.createElement('option');
                    option.value = val;
                    datalist.appendChild(option);
                });
            });
        }

        function resetForm() {
            ['hn', 'name', 'dxBefore', 'comorb', 'fuDate', 'clinic', 'readmitDate', 'ward', 'dxReadmit'].forEach(id => document.getElementById(id).value = '');
        }

        function saveData() { 
            localStorage.setItem('hospital_discharge_records', JSON.stringify(records)); 
        }

        function render() {
            const list = document.getElementById('mobileRecordList');
            list.innerHTML = '';
            let rc = 0, ref = 0;

            records.forEach((r, idx) => {
                if (r.readmitDate) rc++;
                if (r.disType === 'Refer back') ref++;

                const card = document.createElement('div');
                card.className = 'bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-3 animate-fade';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${r.disDate}</span>
                            <div class="font-bold text-sky-700">${r.hn} : ${r.name}</div>
                        </div>
                        <button onclick="removeItem(${r.id})" class="text-slate-200 p-1"><i class="fa-solid fa-times"></i></button>
                    </div>
                    <div class="text-xs text-slate-500"><span class="font-bold">Dx:</span> ${r.dxBefore}</div>
                    ${r.readmitDate ? `<div class="bg-orange-50 text-orange-600 text-[10px] p-2 rounded-lg font-bold inline-block">Re-admit: ${r.readmitDate}</div>` : ''}
                    <button onclick="analyzePatient(${idx})" class="w-full bg-indigo-50 text-indigo-600 py-2 rounded-xl text-[11px] font-bold">
                        AI วิเคราะห์การดูแล ✨
                    </button>
                `;
                list.appendChild(card);
            });

            document.getElementById('totalDischarge').innerText = records.length;
            document.getElementById('totalReadmit').innerText = rc;
            document.getElementById('totalRefer').innerText = ref;
            
            // อัปเดตรายการแนะนำทุกครั้งที่เรนเดอร์ข้อมูลใหม่
            updateSuggestions();
        }

        function removeItem(id) {
            if(confirm('ลบ?')) { records = records.filter(r => r.id !== id); saveData(); render(); }
        }

        function clearAll() { if(confirm('ล้างทั้งหมด?')) { records = []; saveData(); render(); } }
        function showModal(c) { document.getElementById('aiContent').innerHTML = c; document.getElementById('aiModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('aiModal').classList.add('hidden'); }

        function showAlert(t, type) {
            const container = document.getElementById('alertContainer');
            const d = document.createElement('div');
            d.className = `p-4 rounded-2xl shadow-lg text-white text-center font-bold text-sm ${type === 'success' ? 'bg-sky-500' : 'bg-red-500'}`;
            d.innerText = t;
            container.appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        window.onload = () => {
            render();
            checkSyncStatus();
        };
    </script>
</body>
</html>
